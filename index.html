<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🎲 每日快乐盲盒</title>
  <meta name="description" content="每天给你加点料——运势、毒汤、奇奇怪怪的日子，一键分享快乐！">
  <meta property="og:title" content="🎲 每日快乐盲盒">
  <meta property="og:description" content="测测你今天什么运势？刷新一下，生活就有新惊喜！">
  <meta property="og:type" content="website">
  <meta name="theme-color" content="#1a1a2e">
  <!-- Zero external CDN dependencies — pure frontend, works offline even in China! -->
  <style>
    /* ===== Reset & Base ===== */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: #0f0c29;
      color: #fff;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* ===== Animated Background ===== */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      z-index: -2;
    }
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(123, 104, 238, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(255, 107, 53, 0.1) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(0, 200, 83, 0.08) 0%, transparent 50%);
      z-index: -1;
      animation: bgShift 8s ease-in-out infinite alternate;
    }
    @keyframes bgShift {
      0% { opacity: 0.7; }
      100% { opacity: 1; }
    }

    /* Floating particles */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: rgba(255,255,255,0.3);
      border-radius: 50%;
      animation: float linear infinite;
    }
    @keyframes float {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
    }

    /* ===== App Container ===== */
    #app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100%;
      max-width: 480px;
      margin: 0 auto;
      padding: 16px 16px 0;
    }

    /* ===== Header ===== */
    header {
      text-align: center;
      padding: 12px 0 8px;
      flex-shrink: 0;
    }
    header h1 {
      font-size: 26px;
      font-weight: 700;
      background: linear-gradient(135deg, #f093fb, #f5576c, #4facfe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 1px;
    }
    header .subtitle {
      display: block;
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      margin-top: 2px;
      font-weight: 300;
    }

    /* ===== Timer / Auto-refresh hint ===== */
    .timer-bar {
      flex-shrink: 0;
      text-align: center;
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      padding: 2px 0 8px;
      letter-spacing: 0.5px;
    }

    /* ===== Main Card Area ===== */
    .card-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
      padding: 4px 0;
    }

    #card {
      width: 100%;
      max-width: 420px;
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 24px;
      padding: 28px 24px 24px;
      transition: opacity 0.3s ease, transform 0.3s ease;
      transform: translateY(0);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    #card.fade-out {
      opacity: 0;
      transform: translateY(12px) scale(0.97);
    }

    /* Card content shared */
    .card-emoji {
      font-size: 52px;
      text-align: center;
      margin-bottom: 10px;
      line-height: 1;
    }
    .card-title {
      text-align: center;
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 4px;
      line-height: 1.3;
    }
    .card-subtitle {
      text-align: center;
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 16px;
    }
    .card-body {
      font-size: 15px;
      line-height: 1.7;
      color: rgba(255,255,255,0.85);
    }
    .card-body .line {
      padding: 5px 0;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }
    .card-body .line .label {
      color: rgba(255,255,255,0.4);
      min-width: 60px;
      flex-shrink: 0;
      font-size: 13px;
    }
    .card-body .line .value {
      flex: 1;
    }
    .card-body .highlight {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 6px;
      font-weight: 600;
      font-size: 14px;
    }
    .color-swatch {
      display: inline-block;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      vertical-align: middle;
      margin-right: 6px;
      border: 2px solid rgba(255,255,255,0.2);
    }

    /* Soup specific */
    .soup-text {
      font-size: 18px;
      line-height: 1.6;
      text-align: center;
      padding: 12px 0 8px;
      color: rgba(255,255,255,0.9);
      font-weight: 400;
      letter-spacing: 0.3px;
    }
    .soup-tag {
      display: inline-block;
      background: rgba(255,255,255,0.1);
      padding: 3px 12px;
      border-radius: 12px;
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      margin-top: 12px;
    }

    /* Day specific */
    .day-big {
      font-size: 48px;
      text-align: center;
      margin-bottom: 6px;
    }
    .day-identities {
      padding: 12px 0;
    }
    .day-identity-item {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 10px 14px;
      margin-bottom: 8px;
      font-size: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .day-identity-item .emoji { font-size: 24px; }
    .day-footer {
      text-align: center;
      font-size: 12px;
      color: rgba(255,255,255,0.35);
      margin-top: 8px;
    }

    /* ===== Actions ===== */
    .actions {
      flex-shrink: 0;
      display: flex;
      gap: 12px;
      padding: 10px 0 8px;
      justify-content: center;
    }
    .actions button {
      flex: 1;
      max-width: 180px;
      padding: 14px 0;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .actions button:active {
      transform: scale(0.95);
    }
    #refreshBtn {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }
    #refreshBtn:active {
      box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
    }
    #shareBtn {
      background: rgba(255,255,255,0.1);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.15);
    }
    #shareBtn:active {
      background: rgba(255,255,255,0.15);
    }

    /* ===== Tab Bar ===== */
    nav.tabs {
      flex-shrink: 0;
      display: flex;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 16px 16px 0 0;
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-bottom: none;
      overflow: hidden;
      margin: 0 -16px;
    }
    nav.tabs button {
      flex: 1;
      padding: 14px 0;
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.4);
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      touch-action: manipulation;
    }
    nav.tabs button.active {
      color: #fff;
      background: rgba(255,255,255,0.05);
    }
    nav.tabs button.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 20%;
      right: 20%;
      height: 3px;
      background: linear-gradient(90deg, #f093fb, #f5576c);
      border-radius: 3px 3px 0 0;
    }
    nav.tabs button:active {
      background: rgba(255,255,255,0.08);
    }

    /* ===== Toast ===== */
    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(10px);
      color: #fff;
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 14px;
      opacity: 0;
      transition: all 0.4s ease;
      pointer-events: none;
      z-index: 100;
      white-space: nowrap;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ===== Responsive ===== */
    @media (max-width: 400px) {
      #app { padding: 12px 12px 0; }
      header h1 { font-size: 22px; }
      #card { padding: 20px 16px 18px; border-radius: 20px; }
      .card-emoji { font-size: 42px; }
      .card-title { font-size: 19px; }
      .card-body { font-size: 14px; }
      .actions button { font-size: 14px; padding: 12px 0; }
      nav.tabs button { font-size: 13px; padding: 12px 0; }
      .soup-text { font-size: 16px; }
      .day-big { font-size: 38px; }
    }

    @media (max-height: 640px) {
      header { padding: 6px 0 2px; }
      header h1 { font-size: 20px; }
      header .subtitle { font-size: 11px; }
      .timer-bar { display: none; }
      #card { padding: 16px 14px 14px; }
      .card-emoji { font-size: 34px; margin-bottom: 4px; }
      .card-title { font-size: 17px; }
      .card-subtitle { font-size: 11px; margin-bottom: 8px; }
      .card-body .line { padding: 3px 0; }
      nav.tabs button { padding: 10px 0; font-size: 13px; }
      .actions { padding: 6px 0; }
      .actions button { padding: 10px 0; font-size: 13px; }
      .soup-text { font-size: 15px; padding: 4px 0; }
      .day-big { font-size: 30px; }
      .day-identity-item { padding: 6px 10px; font-size: 13px; }
    }

    /* Landscape orientation */
    @media (orientation: landscape) and (max-height: 500px) {
      #app { flex-direction: row; flex-wrap: wrap; padding: 8px; }
      header { width: 100%; padding: 4px 0; }
      header h1 { font-size: 16px; }
      header .subtitle { display: none; }
      .timer-bar { display: none; }
      .card-wrapper { flex: 1; min-width: 0; padding: 4px; }
      #card { padding: 12px; border-radius: 16px; }
      .card-emoji { font-size: 24px; margin-bottom: 2px; }
      .card-title { font-size: 14px; }
      .card-subtitle { font-size: 10px; margin-bottom: 4px; }
      .card-body { font-size: 12px; }
      .card-body .line { padding: 1px 0; gap: 4px; }
      .card-body .line .label { min-width: 40px; font-size: 11px; }
      .soup-text { font-size: 13px; padding: 2px 0; }
      .actions { padding: 4px; gap: 8px; }
      .actions button { padding: 6px 12px; font-size: 12px; max-width: 120px; }
      nav.tabs { margin: 0 -8px; border-radius: 12px 12px 0 0; }
      nav.tabs button { padding: 6px 0; font-size: 11px; }
      .day-big { font-size: 22px; }
      .day-identity-item { padding: 4px 8px; font-size: 11px; margin-bottom: 4px; }
    }
  </style>
</head>

      const items = [animal, food, weird];
      // Shuffle and pick `count`
      for (let i = items.length - 1; i > 0; i--) {

        [items[i], items[j]] = [items[j], items[i]];
      }
      const footer = pick(DAYS.footers);
      return { items: items.slice(0, count), footer };

        ctx.beginPath();

        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.strokeStyle = 'rgba(255,255,255,0.15)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.roundRect(cx, cy, cw, ch, 32);

        // --- Draw content based on tab ---

        ctx.textAlign = 'center';

        if (currentTab === 'fortune') {

        // --- Convert to blob ---
        const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
        const file = new File([blob], 'fun-box-share.png', { type: 'image/png' });

        // --- Try Web Share API (Android/iOS native) ---
        if (navigator.share) {

              // Web Share failed, fall through to download

        // --- Fallback: Download image + copy text ---

          await navigator.clipboard.writeText(shareText + '\n\n' + window.location.href);

    // Helper: draw wrapped text centered
    function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
      const chars = text.split('');
      let line = '';
      let ly = y;
      for (const ch of chars) {
        const test = line + ch;
        if (ctx.measureText(test).width > maxWidth && line) {
          ctx.fillText(line, x, ly);
          line = ch;
          ly += lineHeight;
        } else {
          line = test;
        }
      }
      if (line) ctx.fillText(line, x, ly);
    }

    let autoTimer = null;
    let countdown = 30 * 60; // 30 minutes in seconds
    const timerBar = document.getElementById('timerBar');

    function startAutoTimer() {
      countdown = 30 * 60;
      updateTimerDisplay();
      clearInterval(autoTimer);
      autoTimer = setInterval(() => {
        countdown--;
        updateTimerDisplay();
        if (countdown <= 0) {
          refresh();
          countdown = 30 * 60;
        }
      }, 1000);
    }

    function updateTimerDisplay() {
      const min = Math.floor(countdown / 60);
      const sec = countdown % 60;
      timerBar.textContent = `⏱ 下次自动刷新 · ${min}:${sec.toString().padStart(2, '0')}`;
    }

    // ========================================================================
    //  SWIPE GESTURE (mobile)
    // ========================================================================

    let touchStartX = 0;
    let touchStartY = 0;
    const SWIPE_THRESHOLD = 50;

    document.addEventListener('touchstart', e => {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    }, { passive: true });

    document.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - touchStartX;
      const dy = e.changedTouches[0].clientY - touchStartY;

      // Only horizontal swipes, not too vertical
      if (Math.abs(dx) > SWIPE_THRESHOLD && Math.abs(dy) < Math.abs(dx) * 0.7) {
        const tabs = ['fortune', 'soup', 'day'];
        const idx = tabs.indexOf(currentTab);
        if (dx > 0 && idx > 0) {
          // Swipe right → previous
          switchTab(tabs[idx - 1]);
          if (navigator.vibrate) navigator.vibrate(8);
        } else if (dx < 0 && idx < tabs.length - 1) {
          // Swipe left → next
          switchTab(tabs[idx + 1]);
          if (navigator.vibrate) navigator.vibrate(8);
        }
      }
    }, { passive: true });

    // ========================================================================
    //  KEYBOARD SHORTCUTS
    // ========================================================================

    document.addEventListener('keydown', e => {
      if (e.key === ' ' || e.key === 'r') {
        e.preventDefault();
        refresh();
      }
      if (e.key === 'ArrowLeft') {
        const tabs = ['fortune', 'soup', 'day'];
        const idx = tabs.indexOf(currentTab);
        if (idx > 0) switchTab(tabs[idx - 1]);
      }
      if (e.key === 'ArrowRight') {
        const tabs = ['fortune', 'soup', 'day'];
        const idx = tabs.indexOf(currentTab);
        if (idx < tabs.length - 1) switchTab(tabs[idx + 1]);
      }
    });

    // ========================================================================
    //  INIT
    // ========================================================================

    function init() {
      initParticles();

      // Tab buttons
      tabBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          switchTab(btn.dataset.tab);
          if (navigator.vibrate) navigator.vibrate(5);
        });
      });

      // Refresh
      refreshBtn.addEventListener('click', refresh);

      // Share
      shareBtn.addEventListener('click', shareContent);

      // Initial render
      currentData = generateForTab('fortune');
      updateCard('fortune', currentData, false);

      // Auto-refresh
      startAutoTimer();

      // Reset timer on manual refresh
      refreshBtn.addEventListener('click', () => {
        countdown = 30 * 60;
        updateTimerDisplay();
      });

      console.log('🎲 每日快乐盲盒已启动！');
      console.log('💡 提示：左右滑动切换模式 · 空格键刷新 · 长按卡片分享');
    }

    // Wait for DOM
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
</body>
</html>
